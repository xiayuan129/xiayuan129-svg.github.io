<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合成大西瓜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#f9f9f9;
display:flex;align-items:center;justify-content:center;
min-height:100vh;padding:10px;
}
.game{
position:relative;width:100%;max-width:380px;
aspect-ratio:9/16;background:#fff;
border-radius:22px;overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}
#c{width:100%;height:100%;display:block}
.score{
position:absolute;top:20px;left:20px;
color:#fff;font-size:22px;font-weight:600;
text-shadow:0 2px 4px rgba(0,0,0,0.2)
}
.skins{
position:absolute;top:20px;right:20px;
display:flex;gap:8px
}
.skin{
width:32px;height:32px;border-radius:50%;
cursor:pointer;border:2px solid #fff
}
.skin1{background:linear-gradient(135deg,#667eea,#764ba2)}
.skin2{background:linear-gradient(135deg,#22b6f0,#6dd5fa)}
.skin3{background:linear-gradient(135deg,#44e088,#2ed573)}
.over{
position:absolute;inset:0;background:rgba(0,0,0,0.6);
display:none;flex-direction:column;align-items:center;justify-content:center;
color:#fff
}
.over h2{font-size:42px;margin-bottom:10px}
.over p{font-size:20px;margin-bottom:20px}
.restart{
padding:10px 24px;background:#fff;color:#000;
border:none;border-radius:30px;font-weight:bold;
cursor:pointer
}
</style>
</head>

<body>
<div class="game">
<div class="score">分数：0</div>
<div class="skins">
<div class="skin skin1" data-mode="1"></div>
<div class="skin skin2" data-mode="2"></div>
<div class="skin skin3" data-mode="3"></div>
</div>
<canvas id="c"></canvas>
<div class="over">
<h2>游戏结束</h2>
<p>得分：<span id="final">0</span></p>
<button class="restart">再来一局</button>
</div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const scoreText = document.querySelector('.score');
const finalScore = document.getElementById('final');
const over = document.querySelector('.over');
const restart = document.querySelector('.restart');
const skins = document.querySelectorAll('.skin');

const W = 380, H = 650;
c.width = W; c.height = H;

let theme = 1;
const bgList = {
1: 'linear-gradient(135deg,#667eea,#764ba2)',
2: 'linear-gradient(135deg,#22b6f0,#6dd5fa)',
3: 'linear-gradient(135deg,#44e088,#2ed573)'
};

// 你的6张图片作为水果
const imgs = [];
const urls = [
"https://p3-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/2d982789b74247708d9612b294d31923.jpeg",
"https://p9-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/8a7d0872474545459879867676767676.jpeg",
"https://p3-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/1234567890abcdef1234567890abcdef.jpeg",
"https://p3-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/9876543210fedcba9876543210fedcba.jpeg",
"https://p3-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/11223344556677889900aabbccddeeff.jpeg",
"https://p3-pc-sign.douyinpic.com/obj/tos-cn-i-a9a6449f/ffeeddccbbaa99887766554433221100.jpeg"
];

urls.forEach(u => {
  const i = new Image();
  i.src = u;
  imgs.push(i);
});

const fruits = [
  { r:22, img:imgs[0] },
  { r:28, img:imgs[1] },
  { r:34, img:imgs[2] },
  { r:40, img:imgs[3] },
  { r:46, img:imgs[4] },
  { r:52, img:imgs[5] }
];

let game = {
  balls:[], score:0, over:false,
  fall:null, next:0
};

function sound(type){
  const a=new Audio();
  if(type===0)a.src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3";
  if(type===1)a.src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.mp3";
  if(type===2)a.src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3";
  a.volume=0.4; a.play().catch(()=>{});
}

function setBg(){
  document.querySelector('.game').style.background=bgList[theme];
}

function ball(x,t){
  return {x,y:fruits[t].r, r:fruits[t].r, t, vx:0, vy:0.3};
}

function hit(a,b){
  const dx=a.x-b.x, dy=a.y-b.y;
  return Math.hypot(dx,dy) < a.r+b.r;
}

function merge(a,b){
  if(a.t!==b.t)return;
  const nt=a.t+1;
  if(nt>=fruits.length)return;
  game.balls=game.balls.filter(o=>o!==a&&o!==b);
  game.balls.push({
    x:(a.x+b.x)/2, y:(a.y+b.y)/2,
    r:fruits[nt].r, t:nt, vx:0, vy:0.2
  });
  game.score += (nt+1)*10;
  sound(1);
}

function update(){
  if(game.over)return;
  game.balls.forEach(b=>{
    b.vy+=0.12;
    b.x+=b.vx; b.y+=b.vy; b.vx*=0.98;
    if(b.x<b.r){b.x=b.r;b.vx*=-0.7;}
    if(b.x>W-b.r){b.x=W-b.r;b.vx*=-0.7;}
    if(b.y>H-b.r){b.y=H-b.r;b.vy=0;}
  });

  for(let i=0;i<game.balls.length;i++){
    for(let j=i+1;j<game.balls.length;j++){
      const a=game.balls[i],b=game.balls[j];
      if(hit(a,b)){ merge(a,b); return; }
    }
  }

  if(game.balls.some(b=>b.y<60)){
    game.over=true;
    over.style.display="flex";
    finalScore.textContent=game.score;
    sound(2);
  }
  scoreText.textContent="分数："+game.score;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(game.fall){
    const b=game.fall;
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(b.t<imgs.length?imgs[b.t]:imgs[0],b.x-b.r,b.y-b.r,b.r*2,b.r*2);
    ctx.restore();
  }
  game.balls.forEach(b=>{
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(b.t<imgs.length?imgs[b.t]:imgs[0],b.x-b.r,b.y-b.r,b.r*2,b.r*2);
    ctx.restore();
  });
  requestAnimationFrame(loop);
}

function loop(){ update(); draw(); }

c.addEventListener('mousemove',e=>{
  if(game.over||game.fall)return;
  const r=c.getBoundingClientRect();
  const x=e.clientX-r.left;
  game.fall=ball(Math.max(fruits[game.next].r,Math.min(W-fruits[game.next].r,x)),game.next);
});

c.addEventListener('click',()=>{
  if(game.over||!game.fall)return;
  game.balls.push(game.fall);
  game.fall=null;
  game.next=Math.floor(Math.random()*3);
  sound(0);
});

restart.addEventListener('click',()=>{
  game.balls=[]; game.score=0;
  game.over=false; game.fall=null;
  over.style.display="none";
});

skins.forEach(s=>{
  s.addEventListener('click',()=>{
    theme=Number(s.dataset.mode);
    setBg();
  });
});

setBg();
loop();
</script>
</body>
</html>
