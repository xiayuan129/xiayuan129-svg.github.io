<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music | 发现好音乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
html,body{height:100%}
body{background:#0a0a0c;color:#e8e8e8;display:flex;flex-direction:column}

/* 顶部导航 */
header{position:sticky;top:0;z-index:99;padding:16px 24px;background:rgba(10,10,12,0.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:0.5px}
nav{display:flex;gap:28px}
nav a{color:#aaa;text-decoration:none;font-size:14px;transition:color 0.2s}
nav a:hover{color:#fff}

/* 主体容器 */
.container{flex:1;width:100%;max-width:1100px;margin:0 auto;padding:24px}

/* 英雄区 */
.hero{margin-bottom:40px;padding:32px;border-radius:18px;background:linear-gradient(135deg,#165DFF,#6366F1);color:white}
.hero h1{font-size:32px;margin-bottom:8px}
.hero p{font-size:15px;opacity:0.9}

/* 标题样式 */
.section-title{font-size:18px;font-weight:600;margin-bottom:16px;padding-left:10px;border-left:3px solid #165DFF}

/* 歌单网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:40px}
.card{background:#121216;border-radius:14px;padding:14px;transition:all 0.25s ease;border:1px solid rgba(255,255,255,0.05)}
.card:hover{transform:translateY(-4px);background:#1a1a22}
.card-cover{width:100%;aspect-ratio:1;background:#1e1e28;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:#888}

/* 底部播放器 */
.player{position:fixed;left:0;right:0;bottom:0;background:rgba(10,10,12,0.9);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06);padding:14px 24px}
.player-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:20px}
.track{display:flex;align-items:center;gap:12px;flex:1}
.cover{width:48px;height:48px;background:#1e1e28;border-radius:8px}
.info{line-height:1.3}
.info h4{font-size:14px;font-weight:500}
.info p{font-size:12px;color:#888;margin-top:2px}
.controls{display:flex;align-items:center;gap:16px}
.btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
.play{width:36px;height:36px;background:#fff;color:#000;border-radius:50%}
.progress{flex:2;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.bar{width:35%;height:100%;background:#165DFF;border-radius:2px}

@media(max-width:768px){
.hero h1{font-size:24px}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<header>
<div class="nav-inner">
<div class="logo">🎵 Music</div>
<nav>
<a href="#">首页</a>
<a href="#">发现</a>
<a href="#">歌单</a>
<a href="#">我的</a>
</nav>
</div>
</header>

<div class="container">
<section class="hero">
<div>
<h1>发现好音乐</h1>
<p>为你精选每日推荐，随时随地享受高品质声音</p>
</div>
</section>

<h2 class="section-title">推荐歌单</h2>
<div class="grid">
<div class="card">
<div class="card-cover">🎶</div>
<div class="card-title">流行热歌榜</div>
<div class="card-desc">2025最新热门单曲</div>
</div>
<div class="card">
<div class="card-cover">🎸</div>
<div class="card-title">经典摇滚</div>
<div class="card-desc">永不褪色的摇滚金曲</div>
</div>
<div class="card">
<div class="card-cover">🎹</div>
<div class="card-title">轻音乐合集</div>
<div class="card-desc">专注、放松、治愈</div>
</div>
<div class="card">
<div class="card-cover">🎤</div>
<div class="card-title">华语精选</div>
<div class="card-desc">百听不厌的经典</div>
</div>
</div>

<h2 class="section-title">最新上架</h2>
<div class="grid">
<div class="card">
<div class="card-cover">✨</div>
<div class="card-title">新歌首发</div>
<div class="card-desc">每周持续更新</div>
</div>
<div class="card">
<div class="card-cover">🎧</div>
<div class="card-title">Hi-Res音质</div>
<div class="card-desc">高解析无损音乐</div>
</div>
</div>
</div>

<div class="player">
<div class="player-inner">
<div class="track">
<div class="cover"></div>
<div class="info">
<h4>正在播放</h4>
<p>歌手 - 歌曲名称</p>
</div>
</div>
<div class="controls">
<button class="btn">⏮</button>
<button class="btn play">▶</button>
<button class="btn">⏭</button>
</div>
<div class="progress"><div class="bar"></div></div>
</div>
</div>

<script>
const play = document.querySelector('.play')
let playing = false
play.addEventListener('click', () => {
playing = !playing
play.textContent = playing ? '⏸' : '▶'
})

document.querySelectorAll('.card').forEach(card => {
card.addEventListener('click', () => {
const t = card.querySelector('.card-title').textContent
alert(`打开歌单：${t}`)
})
})
</script>
</body>
</html>
